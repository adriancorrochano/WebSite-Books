<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Download The Universe Explained</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050814;
    --star: #E2E8F0;
    --grey: #94A3B8;
    --accent: #38BDF8;
    --accent-glow: rgba(56, 189, 248, 0.5);
    --card-bg: rgba(15, 23, 42, 0.7);
    --card-border: #1E293B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--star);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.6; overflow-x: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  
  .space-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; background: radial-gradient(circle at center, #0B1120 0%, #03040B 100%); }
  .stars { width: 1px; height: 1px; background: transparent; box-shadow: 174px 233px #FFF, 542px 145px #FFF, 842px 345px #FFF, 241px 765px #FFF, 942px 143px #FFF; animation: animStar 50s linear infinite; }
  .stars:after { content: " "; position: absolute; top: 2000px; width: 1px; height: 1px; background: transparent; box-shadow: 174px 233px #FFF, 542px 145px #FFF, 842px 345px #FFF, 241px 765px #FFF, 942px 143px #FFF; }
  @keyframes animStar { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }

  .download-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    max-width: 600px;
    width: 90%;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    z-index: 10;
  }

  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 36px; margin-bottom: 16px; color: #10B981; }
  p { color: var(--grey); font-size: 16px; margin-bottom: 32px; }
  
  .btn-primary { background: var(--accent); color: #000; padding: 16px 32px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: inline-block; box-shadow: 0 0 20px var(--accent-glow); transition: all 0.2s; border: none; cursor: pointer; text-decoration: none; }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent-glow); background: #7DD3FC; }
  
  .cover-preview { width: 150px; border-radius: 8px; margin-bottom: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div class="space-bg"><div class="stars"></div></div>

<div class="download-box">
  <img src="cover1.png" alt="The Universe Explained" class="cover-preview">
  <h1>Payment Successful!</h1>
  <p>Thank you for your purchase. Your journey into the cosmos starts right now. Click the button below to download your copy of <strong>The Universe Explained</strong>.</p>
  
  <!-- This links to the PDF file you will put in your folder -->
  <a href="The_Universe_Explained.pdf" download class="btn-primary">⬇ Download PDF Book</a>
  
  <div style="margin-top: 32px; font-size: 13px; color: var(--grey);">
    Having trouble? Email us at support@theuniverseofastronomy.com
  </div>
</div>

</body>
</html>
